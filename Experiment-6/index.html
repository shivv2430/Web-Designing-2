<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamically Change Content</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="mainHeading">Welcome to JavaScript</h2>

        <input type="text" id="UserInput" placeholder="Enter new heading Text ">
        <br></br>

        <button id="ChangeTextBtn">Change Text</button>
        <button id="bgcolorBtn">Change Background</button>
        <button id="IncreaseSizeBtn">Increase fontSize</button>
        <button id="DecreaseSizeBtn">Decrease fontSize</button>
        <button id="toggleBtn">Hide/Show Paragraph</button>
        <button id="ResetBtn">Reset</button>
     
        <p id="paragraph">This is a sample paragraph. JavaScript events can dynamically change content</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
